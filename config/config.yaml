# =============================================================
# COCOV Experimental Configuration
# =============================================================

paths:
  vggface2_root: "/opt/data/vggface2/VGGface2_None_norm_512_true_bygfpgan"
  cacd_root: "/opt/data/cacd/archive/cacd_split/cacd_split"
  fgnet_root: "/opt/data/fgnet/FGNET/images"
  embeddings_dir: "/opt/data/embeddings"
  results_dir: "/opt/data/cocov/results"
  logs_dir: "/opt/data/logs"

# On-disk layout produced by the pipeline:
#
#   /opt/data/embeddings/
#       facenet/vggface2/{id}/embeddings.npy    <- subfoldered by encoder name
#       arcface_r50/...
#       arcface_r100/...
#       adaface/...
#       vitb_arcface/...
#
#   /opt/data/cocov/results/
#       ENC01_FACENET/                          <- subfoldered by encoder code
#           calibration_results.json
#           run_00/{method}.json
#           run_01/{method}.json  ...
#           aggregated_results.json
#           results_table.tex
#           cross_dataset_results.json
#           ablation_results.json
#       ENC02_ARCFACE_R50/   (same structure)
#       ENC03_ARCFACE_R100/
#       ENC04_ADAFACE/
#       ENC05_VITB_ARCFACE/
#
#   /opt/data/logs/   (shared)

dataset:
  vggface2:
    n_identities: 3000
    batch_size: 100
    n_diagnostic: 200
    min_images_per_identity: 20
    enrollment_size: 5
    random_seed: 42

  cacd:
    min_images_per_identity: 20
    enrollment_size: 5
    random_seed: 42
    max_identities: 500

  fgnet:
    enrollment_size: 5
    random_seed: 42

experiment:
  n_runs: 30
  impostor_ratio: 1.0
  random_seed_base: 42

# -------------------------------------------------------------
# Encoder configuration
#
# name         : encoder key passed to get_encoder().
#                One of: facenet | arcface_r50 | arcface_r100
#                        | adaface | vitb_arcface
#
# embedding_dim: must be 512 for all current backbones.
#
# input_size   : backbone-specific input resolution.
#                facenet      -> 160
#                all others   -> 112
#
# cache_subdir : subdirectory under paths.embeddings_dir where
#                extracted embeddings are stored.  Defaults to
#                the encoder name so each backbone has its own
#                cache and caches never interfere with each other.
#
# device       : 'cuda' or 'cpu'.
#
# adaface_weights  : path to AdaFace checkpoint (adaface only).
#                    Overrides the ADAFACE_WEIGHTS env var when set.
#
# vitarcface_weights : path to ViT ONNX or PyTorch checkpoint.
#                    Overrides the VITARCFACE_WEIGHTS env var when set.
# -------------------------------------------------------------
encoder:
  name: "facenet"               # change this to switch backbone
  code: "ENC01_FACENET"         # used as results subfolder: /opt/data/cocov/results/{code}/
  embedding_dim: 512
  input_size: 160               # 160 for facenet; 112 for all others
  device: "cuda"
  cache_subdir: "facenet"       # embedding cache subdirectory (= name)

  # Encoder-specific weight paths (leave empty to use defaults / env vars)
  adaface_weights: ""
  vitarcface_weights: ""

# Encoder reference table — update name, code, input_size, cache_subdir together:
#
#   name            code                  input_size  cache_subdir
#   facenet         ENC01_FACENET         160         facenet
#   arcface_r50     ENC02_ARCFACE_R50     112         arcface_r50
#   arcface_r100    ENC03_ARCFACE_R100    112         arcface_r100
#   adaface         ENC04_ADAFACE         112         adaface
#   vitb_arcface    ENC05_VITB_ARCFACE    112         vitb_arcface

verification:
  threshold: 0.5

drift:
  threshold: 0.35

prototype:
  assign_threshold: 0.3
  new_threshold: 0.6
  merge_threshold: 0.95
  momentum: 0.5
  max_prototypes: 10

baselines:
  replay:
    buffer_size: 10
    consolidation_interval: 5
  buffer:
    buffer_size: 10

calibration:
  n_calibration_identities: 200
  calibration_seed: 99
  calibration_operating_point: "tar_far1"
  sweep:
    verification_threshold:
      min: 0.1
      max: 0.9
      steps: 17
    drift_threshold:
      min: 0.1
      max: 0.9
      steps: 17
    assign_threshold:
      min: 0.1
      max: 0.6
      steps: 11
    new_threshold:
      min: 0.3
      max: 0.9
      steps: 13
    merge_threshold:
      min: 0.7
      max: 0.99
      steps: 10
    momentum:
      min: 0.5
      max: 0.99
      steps: 10
    max_prototypes:
      values: [1, 2, 3, 5, 7, 10, 15, 20]

webapp:
  host: "0.0.0.0"
  port: 8000
  escalation_log: "/opt/data/logs/reviewer_log.json"
